<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ email_title|default:brand_name }}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#070b12;color:#e6eef6;font-family:'Segoe UI',Arial,Helvetica,sans-serif;">
    {% if preheader %}
      <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;mso-hide:all;">{{ preheader }}</div>
    {% endif %}
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:linear-gradient(180deg,#070b12 0%,#0a1322 100%);margin:0;padding:24px 0;">
      <tr>
        <td align="center" style="padding:0 16px;">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;border:1px solid rgba(230,238,246,0.14);border-radius:20px;overflow:hidden;background:linear-gradient(180deg,rgba(14,20,33,0.96),rgba(8,12,20,0.98));box-shadow:0 24px 64px rgba(2,6,23,0.42);">
            <tr>
              <td style="padding:28px 32px 18px 32px;border-bottom:1px solid rgba(230,238,246,0.10);background:radial-gradient(circle at top right, rgba(88,166,255,0.18), transparent 42%),radial-gradient(circle at top left, rgba(167,139,250,0.12), transparent 38%);">
                <div style="font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:#9aa6b2;font-weight:700;margin-bottom:10px;">{{ company_name }}</div>
                <div style="font-size:30px;line-height:1.1;font-weight:800;color:#e6eef6;">{{ heading|default:brand_name }}</div>
                {% if subheading %}
                  <div style="margin-top:10px;font-size:16px;line-height:1.7;color:#b6c0cc;">{{ subheading }}</div>
                {% endif %}
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px;color:#d9e1ea;font-size:16px;line-height:1.75;">
                {% block email_content %}{% endblock %}
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 28px 32px;color:#9aa6b2;font-size:13px;line-height:1.7;">
                <div style="border-top:1px solid rgba(230,238,246,0.10);padding-top:18px;">
                  Need help? Contact us at <a href="mailto:{{ support_email|urlencode }}" style="color:#7db5ff;text-decoration:none;font-weight:600;">{{ support_email }}</a>.
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
